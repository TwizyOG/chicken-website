<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RV X emblem">
  <defs>
    <linearGradient id="rvx-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2A65A"/>
      <stop offset="1" stop-color="#E8853A"/>
    </linearGradient>
    <linearGradient id="rvx-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16130F"/>
      <stop offset="1" stop-color="#3A2A18"/>
    </linearGradient>
  </defs>

  <!-- road-sign shield -->
  <rect x="3" y="3" width="58" height="58" rx="13" fill="#16130F"/>
  <rect x="3" y="3" width="58" height="58" rx="13" fill="none" stroke="#E8853A" stroke-width="3"/>
  <rect x="7.5" y="7.5" width="49" height="49" rx="9" fill="none" stroke="#E8853A" stroke-width="1.1" opacity="0.45"/>

  <!-- dusk sky + low sun -->
  <path d="M9 9 h46 v24 H9 Z" fill="url(#rvx-sky)" opacity="0.9"/>
  <path d="M21 33 a11 11 0 0 1 22 0 Z" fill="url(#rvx-sun)"/>
  <path d="M17 27.5 h7 M40 24 h8 M12 21 h5" stroke="#F2A65A" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

  <!-- mesa silhouettes on the horizon -->
  <path d="M9 33 l7 -5 4 5 Z" fill="#241C12"/>
  <path d="M44 33 l6 -6 5 6 Z" fill="#241C12"/>

  <!-- desert floor -->
  <rect x="9" y="33" width="46" height="22" fill="#241C12"/>

  <!-- road converging to the horizon -->
  <path d="M24 55 L30 33 h4 L40 55 Z" fill="#2E2920"/>
  <path d="M32 53 l0 -4 M32 46 l0 -3.4 M32 40 l0 -2.6 M32 35.6 l0 -1.8" stroke="#F2A65A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- the RV, head-on, rolling toward you -->
  <g>
    <rect x="23.5" y="36.5" width="17" height="13" rx="2.4" fill="#EDE3CB"/>
    <rect x="25.2" y="38.4" width="13.6" height="5" rx="1.4" fill="#3A4A52"/>
    <rect x="25.2" y="38.4" width="13.6" height="1.8" rx="0.9" fill="#5B7079" opacity="0.75"/>
    <rect x="23.5" y="44.6" width="17" height="2" fill="#E8853A"/>
    <circle cx="27" cy="35.2" r="0.9" fill="#F2A65A"/>
    <circle cx="32" cy="35.2" r="0.9" fill="#F2A65A"/>
    <circle cx="37" cy="35.2" r="0.9" fill="#F2A65A"/>
    <rect x="25" y="49.5" width="4.6" height="3.4" rx="1.2" fill="#16130F"/>
    <rect x="34.4" y="49.5" width="4.6" height="3.4" rx="1.2" fill="#16130F"/>
    <circle cx="26.6" cy="47.6" r="1.2" fill="#FBE2A0"/>
    <circle cx="37.4" cy="47.6" r="1.2" fill="#FBE2A0"/>
  </g>
</svg>
