<svg viewBox="0 0 120 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RV X camper">
  <!-- ground shadow -->
  <ellipse cx="58" cy="58" rx="50" ry="3.6" fill="#000000" opacity="0.3"/>

  <!-- coach body -->
  <path d="M6 14 h66 a3 3 0 0 1 3 3 v33 a3 3 0 0 1 -3 3 H9 a3 3 0 0 1 -3 -3 Z" fill="#EDE3CB"/>
  <!-- cab-over bunk -->
  <path d="M68 8 h28 a4 4 0 0 1 4 4 v10 H68 Z" fill="#EDE3CB"/>
  <path d="M68 8 h28 a4 4 0 0 1 4 4 v3 H68 Z" fill="#F6EFDC"/>
  <!-- cab + hood -->
  <path d="M75 22 h21 c6.5 0 11 3.5 13.5 8.5 L112 38 a4 4 0 0 1 4 4 v7 a4 4 0 0 1 -4 4 H75 Z" fill="#E3D6B6"/>
  <!-- windshield -->
  <path d="M96 24.5 c5 0 8.6 2.6 10.8 6.8 l1.4 3.2 H96 Z" fill="#3A4A52"/>
  <path d="M96 24.5 c5 0 8.6 2.6 10.8 6.8 l0.6 1.4 -11.4 -4 Z" fill="#5B7079" opacity="0.9"/>
  <!-- cab side window -->
  <rect x="84" y="25" width="9" height="9" rx="1.2" fill="#3A4A52"/>
  <rect x="84" y="25" width="9" height="3" rx="1.2" fill="#5B7079" opacity="0.7"/>
  <!-- bunk window -->
  <rect x="72" y="12" width="10" height="6" rx="1" fill="#3A4A52"/>

  <!-- coach windows -->
  <rect x="11" y="19" width="14" height="9" rx="1.4" fill="#3A4A52"/>
  <rect x="11" y="19" width="14" height="3.2" rx="1.4" fill="#5B7079" opacity="0.7"/>
  <rect x="29" y="19" width="14" height="9" rx="1.4" fill="#3A4A52"/>
  <rect x="29" y="19" width="14" height="3.2" rx="1.4" fill="#5B7079" opacity="0.7"/>

  <!-- door + handle -->
  <rect x="48" y="22" width="13" height="29" rx="1.6" fill="#D8C7A2"/>
  <rect x="50" y="24" width="9" height="8" rx="1" fill="#3A4A52"/>
  <circle cx="58.5" cy="38" r="1.1" fill="#7A6A48"/>

  <!-- retro stripes (sweep along the body) -->
  <path d="M6 32 H72 v4.5 H6 Z" fill="#E8853A"/>
  <path d="M6 32 H72 v1.4 H6 Z" fill="#F2A65A"/>
  <path d="M6 38.5 H72 v2.6 H6 Z" fill="#B4552D"/>
  <path d="M75 36 h37 l2 4 h-39 Z" fill="#E8853A" opacity="0.92"/>

  <!-- skirt shading -->
  <path d="M6 45 H72 v5 H9 a3 3 0 0 1 -3 -3 Z" fill="#000000" opacity="0.10"/>

  <!-- roof gear: AC + vent -->
  <rect x="16" y="9" width="15" height="5.5" rx="1.6" fill="#CFC1A0"/>
  <rect x="38" y="10.5" width="7" height="4" rx="1" fill="#CFC1A0"/>

  <!-- rear ladder -->
  <path d="M8 16 v32 M13 16 v32" stroke="#8A7B5C" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M8 22 h5 M8 29 h5 M8 36 h5 M8 43 h5" stroke="#8A7B5C" stroke-width="1.4" stroke-linecap="round"/>

  <!-- wheel arches -->
  <path d="M16 53 a10 10 0 0 1 20 0 Z" fill="#2A2620"/>
  <path d="M82 53 a10 10 0 0 1 20 0 Z" fill="#2A2620"/>
  <!-- wheels -->
  <g>
    <circle cx="26" cy="52" r="8.4" fill="#16130F"/>
    <circle cx="26" cy="52" r="4" fill="#6B6052"/>
    <circle cx="26" cy="52" r="1.4" fill="#2A2620"/>
    <path d="M26 48.6 v6.8 M22.6 52 h6.8" stroke="#2A2620" stroke-width="1.1"/>
  </g>
  <g>
    <circle cx="92" cy="52" r="8.4" fill="#16130F"/>
    <circle cx="92" cy="52" r="4" fill="#6B6052"/>
    <circle cx="92" cy="52" r="1.4" fill="#2A2620"/>
    <path d="M92 48.6 v6.8 M88.6 52 h6.8" stroke="#2A2620" stroke-width="1.1"/>
  </g>

  <!-- front: bumper, headlight, grille -->
  <rect x="106" y="46" width="10" height="4.5" rx="2" fill="#3A352D"/>
  <rect x="111.5" y="39.5" width="3.4" height="4" rx="1.2" fill="#FBE2A0"/>
  <path d="M108 44 h6" stroke="#3A352D" stroke-width="1.4" stroke-linecap="round"/>

  <!-- mirror -->
  <path d="M96 24 l4 -3" stroke="#3A352D" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="99" y="18.5" width="3" height="4.6" rx="1" fill="#3A352D"/>

  <!-- exhaust -->
  <rect x="4" y="49" width="5" height="2.4" rx="1.2" fill="#3A352D"/>

  <!-- road grime -->
  <path d="M6 48 q14 3 33 2.4 q20 -0.6 38 1.2 l-1 1.4 H9 a3 3 0 0 1 -3 -3 Z" fill="#5A4632" opacity="0.16"/>
</svg>
